<div class="page-header">
    <div class="title-text">
        <div class="icon-square"><img src="Images/Locations50x50.ico"></div>
        <div>
            <h1>Location Analytics</h1>
            <p>Filter, Search, and export your leads</p>
        </div>
    </div>
</div>

<div class="filter-bar">
    <div class="filter-item filter-wide">
        <select id="locClientSearchSelect" class="search-input-field">
            <option value=""></option>
        </select>
        <span id="locClientError" class="error-msg" style="display:none;">* Select Client</span>
    </div>

    <div class="filter-item filter-wide">
        <div class="custom-dropdown" id="locActivityDropdown">
            <div class="dropdown-selected" style="height: 40px;" onclick="toggleLocDropdown('locActivityDropdown')">
                <span class="selected-text">All Activity</span>
                <i class="fa-solid fa-chevron-down" style="font-size: 0.8rem;"></i>
            </div>
            <ul class="dropdown-options">
                <li class="dropdown-item" onclick="selectLocItem('locActivityDropdown', 'All Activity')">All Activity</li>
                <li class="dropdown-item" onclick="selectLocItem('locActivityDropdown', 'High')">High</li>
                <li class="dropdown-item" onclick="selectLocItem('locActivityDropdown', 'Medium')">Medium</li>
                <li class="dropdown-item" onclick="selectLocItem('locActivityDropdown', 'Low')">Low</li>
            </ul>
        </div>
    </div>

    <div class="filter-item filter-wide">
        <div class="custom-dropdown" style="flex: 1;">
            <select id="locLocationSearchSelect" class="search-input-field">
                <option value=""></option>
            </select>
            <span id="locLocationError" class="error-msg" style="display:none;">* Select location</span>
        </div>
    </div>

    <button class="btn-search" id="locMainSearchBtn" style="padding: 12px 15px; height: 46px;">
        <i class="fa-solid fa-check"></i>
    </button>
</div>

<div class="initial-search-container" id="locLargeSearchContainer">
    <button class="btn-large-search" onclick="showLocResults()">
        <i class="fa-solid fa-magnifying-glass"></i> Search Locations
    </button>
</div>

<div id="locBackBtnWrapper" style="display:none; margin-bottom:15px;">
    <button class="btn-action" onclick="resetLocPage()" style="display: flex; align-items: center; justify-content: center; gap: 8px;">
        <i class="fa-solid fa-arrow-left"></i> Back to Search
    </button>
</div>

<div id="locMainWrapper">
    <div class="glass-card">
        <table class="simple-table">
            <thead>
                <tr>
                    <th>Location</th>
                    <th>Active Campaigns</th>
                    <th>Leads</th>
                    <th>Conversions</th>
                    <th>Conv.Rate</th>
                    <th>Activity</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="locationTableBody"></tbody>
        </table>
    </div>

    <div class="pagination-wrapper">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="pagination-info">
                Showing <span id="loc-start-row">0</span> to <span id="loc-end-row">0</span> of
                <span id="loc-total-rows">0</span> entries
            </div>

            <div class="custom-dropdown" id="locRowsPerPageDropdown" style="width: 60px;min-width: 60px;">
                <div class="dropdown-selected" style="height: 32px; padding: 5px 10px; font-size: 0.8rem;" onclick="toggleLocDropdown('locRowsPerPageDropdown')">
                    <span class="selected-text">4</span>
                    <i class="fa-solid fa-chevron-down" style="font-size: 0.7rem;"></i>
                </div>
                <ul class="dropdown-options" style="bottom: 100%; top: auto; margin-bottom: 5px;">
                    <li class="dropdown-item" onclick="changeLocRowsPerPage(4)">4</li>
                    <li class="dropdown-item" onclick="changeLocRowsPerPage(10)">10</li>
                    <li class="dropdown-item" onclick="changeLocRowsPerPage(25)">25</li>
                    <li class="dropdown-item" onclick="changeLocRowsPerPage(50)">50</li>
                    <li class="dropdown-item" onclick="changeLocRowsPerPage(100)">100</li>
                </ul>
            </div>
        </div>

        <div class="pagination-controls">
            <button class="page-btn prev-btn" id="locPrevBtn" onclick="prevLocPage()"><i class="fa-solid fa-chevron-left"></i></button>
            <div id="loc-page-numbers" class="page-numbers"></div>
            <button class="page-btn next-btn" id="locNextBtn" onclick="nextLocPage()"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
    </div>
</div>
