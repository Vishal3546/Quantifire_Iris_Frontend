<div class="page-header">
    <div class="title-text">
        <div class="icon-square"><img src="Images/Customer50x50.ico" alt="Clients"></div>
        <div>
            <h1>Clients</h1>
            <p>Manage your client relationships and performance</p>
        </div>
    </div>
    <a href="/add-client" data-link class="btn-export" style="text-decoration: none;">Add New Client</a>
</div>

<div class="client-cards-grid" id="kpiCardsContainer"></div>

<div class="glass-card">
    <table class="simple-table">
        <thead>
            <tr>
                <th>Client</th>
                <th>Contact Info</th>
                <th>Campaigns</th>
                <th>Leads</th>
                <th>Conv.Rate</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="clientTableBody"></tbody>
    </table>
</div>

<div class="pagination-wrapper">
    <div style="display: flex; align-items: center; gap: 15px;">
        <div class="pagination-info">
            Showing <span id="start-row">0</span> to <span id="end-row">0</span> of
            <span id="total-rows">0</span> entries
        </div>

        <div class="custom-dropdown" id="clientsRowsPerPageDropdown" style="width: 60px;min-width: 60px;">
            <div class="dropdown-selected" style="height: 32px; padding: 5px 10px; font-size: 0.8rem;" onclick="toggleClientDropdown('clientsRowsPerPageDropdown')">
                <span class="selected-text">4</span>
                <i class="fa-solid fa-chevron-down" style="font-size: 0.7rem;"></i>
            </div>
            <ul class="dropdown-options" style="bottom: 100%; top: auto; margin-bottom: 5px;">
                <li class="dropdown-item" onclick="changeClientRowsPerPage(4)">4</li>
                <li class="dropdown-item" onclick="changeClientRowsPerPage(10)">10</li>
                <li class="dropdown-item" onclick="changeClientRowsPerPage(25)">25</li>
                <li class="dropdown-item" onclick="changeClientRowsPerPage(50)">50</li>
                <li class="dropdown-item" onclick="changeClientRowsPerPage(100)">100</li>
            </ul>
        </div>
    </div>

    <div class="pagination-controls">
        <button class="page-btn prev-btn" onclick="prevClientPage(event)"><i class="fa-solid fa-chevron-left"></i></button>
        <div id="page-numbers" class="page-numbers"></div>
        <button class="page-btn next-btn" onclick="nextClientPage(event)"><i class="fa-solid fa-chevron-right"></i></button>
    </div>
</div>

<div id="deleteModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-icon-box"><i class="fa-regular fa-trash-can"></i></div>
        <h2>Delete Client?</h2>
        <p>Are you sure you want to delete this client?</p>
        <div class="modal-actions">
            <button class="btn-modal btn-modal-cancel" onclick="closeDeleteModal()">Cancel</button>
            <button class="btn-modal btn-modal-delete" onclick="confirmDelete()">Delete</button>
        </div>
    </div>
</div>

<div class="custom-alert-overlay" id="customAlertOverlay">
    <div class="custom-alert-box">
        <div class="alert-icon-box" id="alertIconBox">
            <i class="fa-solid fa-triangle-exclamation"></i>
        </div>
        <h3 id="alertTitle">Alert Title</h3>
        <p id="alertMessage">Alert Message goes here.</p>
        <button class="btn-alert-ok">OK</button>
    </div>
</div>
